<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepagina</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
        }

        h1 {
            margin-bottom: 40px;
            color: #333;
        }

        .button {
            display: block;
            width: 200px;
            margin: 15px auto;
            padding: 15px;
            font-size: 18px;
            color: white;
            background-color: #0070f3;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.3s;
        }

        .button:hover {
            background-color: #005bb5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welkom!</h1>
        <a href="letters.html" class="button">Letters klikken</a>
        <a href="avontuur.html" class="button">Avontuur</a>
        <a href="schieten.html" class="button">Schieten</a>
    </div>
</body>
</html>
