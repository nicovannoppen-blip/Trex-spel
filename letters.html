<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦖 Dino Letters</title>
<link rel="stylesheet" href="letter-jungle.css">
</head>

<body>

<div class="game-container">

    <div id="player-selection">
        <p>Wie speelt?</p>
        <button id="odin-btn">Odin</button>
        <button id="niel-btn">Niel</button>
    </div>

    <h1>Dino Letters 🦖</h1>

    <p>Klik de letters:</p>

    <!-- NIEUW -->
    <img id="word-image" style="width:120px; margin:10px 0;">

    <p id="word"></p>
    <p>Gevonden letters: <span id="collected"></span></p>

    <!-- DINO -->
    <img id="trex" src="assets/trex1.png" style="width:80px; position:absolute;">

    <div id="letters-container"></div>

    <p id="score">Score: 0</p>
    <p id="message"></p>

    <a href="index.html" class="button">⬅ Terug</a>
    <button onclick="switchPlayer()" class="button">🔄 Wissel speler</button>

</div>

<div id="leaves-container"></div>

<audio id="correct-sound" src="sounds/correct.mp3"></audio>
<audio id="wrong-sound" src="sounds/wrong.mp3"></audio>

<script src="letters-dino.js"></script>

</body>
</html>
