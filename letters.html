<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T-Rex Leerspel</title>
<link rel="stylesheet" href="./letters.css">
</head>
<body>

<!-- MENU -->
<div id="menu">
    <h1>🦖 T-Rex Leerspel</h1>
    <p>Kies je level of start spel</p>
    <div id="levelButtons"></div>
    <button id="startBtn">Start bij level 1</button>
</div>

<!-- GAME -->
<div id="game" style="display:none;">
    <img id="trex" src="assets/trex.png">

    <div id="letters"></div>

    <div id="target">
        <img id="wordImage">
    </div>

    <div id="progress"></div>
    <div id="score">⭐ 0</div>

    <div id="levelUI">
        Level <span id="levelText">1</span>
    </div>

    <button id="backBtn">⬅ Menu</button>
</div>

<!-- REWARD -->
<div id="reward">
    <h2>Goed gedaan! 🎉</h2>
    <div id="stars"></div>
    <button id="nextBtn">Volgende</button>
</div>

<script src="./letters.js"></script>
</body>
</html>
