<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T-Rex Leerspel</title>
<link rel="stylesheet" href="letters.css">
</head>
<body>

<header>
    <button id="menuBtn">⬅ Levels</button>
    <div id="title">🦖 T-Rex Leerspel</div>
    <button id="playerBtn">👤 Wissel speler</button>
</header>

<!-- MENU -->
<div id="menu">
    <h1>Kies een level</h1>
    <div id="levelButtons"></div>
    <button id="startBtn">▶ Start bij level 1</button>
</div>

<!-- GAME -->
<div id="game">
    <img id="trex" src="assets/trex1.png">

    <div id="letters"></div>

    <div id="target">
        <img id="wordImage">
    </div>

    <div id="progress"></div>
    <div id="score">⭐ 0</div>
    <div id="levelUI">Level <span id="levelText">1</span></div>
</div>

<!-- REWARD -->
<div id="reward">
    <h2>Goed gedaan! 🎉</h2>
    <div id="stars"></div>
    <button id="nextBtn">➡ Volgende</button>
</div>

<script src="letters.js"></script>
</body>
</html>
