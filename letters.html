<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dino Woordspel</title>
<link rel="stylesheet" href="letters.css">
</head>
<body>

<!-- HEADER -->
<header>
    <button id="backBtn">⬅</button>
    <div id="title">🦖 Woordspel</div>
    <button id="playerBtn">👤</button>
</header>

<!-- PROFIELKEUZE -->
<div id="playerSelect">
    <h2>Kies speler</h2>
    <button onclick="selectPlayer('Speler 1')">Speler 1</button>
    <button onclick="selectPlayer('Speler 2')">Speler 2</button>
</div>

<!-- GAME CONTAINER (zoals letter jungle) -->
<div id="gameContainer">
    <img id="trex" src="assets/trex1.png">

    <div id="letters"></div>

    <div id="target">
        <img id="wordImage">
    </div>

    <div id="progress"></div>
    <div id="score">⭐ 0</div>
</div>

<!-- REWARD -->
<div id="reward">
    <h2>🎉</h2>
    <div id="stars"></div>
    <button id="nextBtn">➡</button>
</div>

<script src="letters.js"></script>
</body>
</html>
