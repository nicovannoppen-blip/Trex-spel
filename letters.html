<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦖 T-Rex Leerspel</title>
<link rel="stylesheet" href="letters.css">
</head>

<body>

<div class="game-container">

    <!-- Profielkeuze -->
    <div id="player-selection">
        <p>Wie speelt?</p>
        <button id="player1-btn">Odin</button>
        <button id="player2-btn">Niel</button>
    </div>

    <h1>🦖 T-Rex Leerspel</h1>

    <p>Bouw het woord:</p>
    <div id="target-pictogram">
        <img id="word-image" src="">
    </div>

    <div id="word-display"></div>
    <div id="collected-display"></div>
    <div id="letters-container"></div>

    <p id="score">Score: 0</p>
    <p id="message"></p>

    <button id="back-btn" class="button">⬅ Terug</button>
    <button id="switch-btn" class="button">🔄 Wissel speler</button>

    <img id="trex" src="assets/trex1.png">

</div>

<div id="leaves-container"></div>

<audio id="correct-sound" src="sounds/correct.mp3"></audio>
<audio id="wrong-sound" src="sounds/wrong.mp3"></audio>

<script src="letters.js"></script>
</body>
</html>
